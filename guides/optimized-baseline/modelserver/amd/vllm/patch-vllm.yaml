# Amended patch-vllm.yaml for the amd/vllm optimized-baseline overlay.
#
# This is the upstream guides/optimized-baseline/modelserver/amd/vllm/patch-vllm.yaml with the
# HF model cache added:
#   - HF_HOME env pointed at /hf-cache (persistent)
#   - a volumeMount + volume backed by the hf-cache RWX PVC (see hf-cache-pvc.yaml)
#
# Replace the upstream patch-vllm.yaml with this in your fork. The only additions vs upstream are
# the HF_HOME env (lines under env:) and the hf-cache volumeMount + volume (marked ADDED).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 8
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          args:
            - "Qwen/Qwen3-32B"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--tensor-parallel-size=2"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
            - name: HF_HOME              # ADDED: point HF cache at the persistent volume
              value: /hf-cache
          resources:
            limits:
              cpu: "16"
              memory: 100Gi
              amd.com/gpu: 2
            requests:
              cpu: "8"
              memory: 100Gi
              amd.com/gpu: 2
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - mountPath: /.triton
              name: triton-cache
            - mountPath: /.config
              name: vllm-config
            - mountPath: /hf-cache       # ADDED: persistent HF model cache
              name: hf-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: hf-cache                 # ADDED: bind the persistent RWX PVC
          persistentVolumeClaim:
            claimName: hf-cache
